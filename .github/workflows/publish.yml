on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::tidyverse
            any::lubridate
            any::broom
            any::terra
            any::sf
            any::spdep
            any::landscapemetrics
            any::mgcv
            any::Hmisc
            any::AICcmodavg
            any::MuMIn
            any::logistf
            any::overlap
            any::detectseparation
            any::CooccurrenceAffinity
            any::patchwork
            any::modelsummary
            any::sjPlot
            any::mapview
            any::rnaturalearth
            any::rnaturalearthdata
            any::tmap
            ropensci/rnaturalearthhires
            darrennorris/eprdados
            griffithdan/cooccur

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}